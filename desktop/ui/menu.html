<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gretchen Flow</title>
    <style>
      @font-face {
        font-family: "PixelOperator";
        src: url("fonts/PixelOperator.ttf") format("truetype");
        font-weight: normal;
      }
      @font-face {
        font-family: "PixelOperator";
        src: url("fonts/PixelOperator-Bold.ttf") format("truetype");
        font-weight: bold;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; width: 100%;
        background: #000;
        overflow: hidden;
      }
      .frame {
        position: fixed; inset: 0;
        background: #000;
        color: #fff;
        font-family: "PixelOperator", monospace;
        font-size: 15px;
        line-height: 1.5;
        -webkit-font-smoothing: none;
        image-rendering: pixelated;
        user-select: none; -webkit-user-select: none;
        display: flex; flex-direction: column;
        overflow: hidden;
      }
      /* draggable strip behind the native traffic lights */
      .dragbar { height: 28px; flex: 0 0 28px; }
      /* framed mascot portrait — lives in the scroll, so it scrolls away */
      .portrait {
        display: flex; flex-direction: column; align-items: center;
        border: 3px solid #fff; border-radius: 12px;
        padding: 12px; margin: 0 0 14px;
      }
      .mascot {
        width: 110px; height: 110px; object-fit: contain;
        image-rendering: pixelated;
      }
      .portrait .name { font-weight: bold; letter-spacing: 2px; margin-top: 8px; }
      .scroll { flex: 1; overflow-y: auto; padding: 0 16px 12px; }
      .scroll::-webkit-scrollbar { width: 8px; }
      .scroll::-webkit-scrollbar-thumb { background: #fff; border-radius: 4px; }
      .status { font-size: 13px; color: #9bff9b; margin: 2px 0 14px; word-break: break-word; }
      .status.warn { color: #ffd23f; }
      h2 { font-size: 13px; font-weight: bold; margin: 16px 0 6px; color: #8be9ff; }
      .item {
        display: flex; align-items: baseline; gap: 6px;
        padding: 5px 6px; margin: 2px 0; cursor: pointer; border-radius: 4px;
      }
      .item:hover { background: #fff; color: #000; }
      .item:hover .note { color: #000; }
      .item .bullet { flex: 0 0 auto; }
      .item .label { flex: 1; word-break: break-word; }
      .item .note { font-size: 12px; color: #ff9b6b; }
      .item.active .bullet { color: #5fff5f; }
      .item.active:hover .bullet { color: #000; }
      .empty { color: #888; padding: 4px 6px; }
      .footer { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 2px solid #fff; }
      .btn { cursor: pointer; padding: 5px 9px; border: 2px solid #fff; border-radius: 4px; font-size: 13px; }
      .btn:hover { background: #fff; color: #000; }
      .btn.danger:hover { background: #ff3b30; border-color: #ff3b30; color: #fff; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="dragbar" data-tauri-drag-region></div>
      <div class="scroll">
        <div class="portrait">
          <img class="mascot" src="gretchen.png" alt="Gretchen" />
          <span class="name">GRETCHEN FLOW</span>
        </div>
        <div id="status" class="status">…</div>

        <h2>MODEL</h2>
        <div id="models"></div>
        <div class="item" id="model-file"><span class="bullet">•</span><span class="label">from file…</span></div>
        <div class="item" id="model-custom"><span class="bullet">•</span><span class="label">custom name…</span></div>

        <h2>HOTKEY</h2>
        <div id="hotkeys"></div>
        <div class="item" id="hotkey-record"><span class="bullet">•</span><span class="label">set custom…</span></div>

        <h2>RECENT</h2>
        <div id="recent"></div>
      </div>
      <div class="footer">
        <span class="btn" id="theme">flip icon</span>
        <span class="btn" id="setup">setup</span>
        <span class="btn" id="reload">reload cfg</span>
        <span class="btn danger" id="quit">quit</span>
      </div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      function row(opts) {
        const el = document.createElement("div");
        el.className = "item" + (opts.active ? " active" : "");
        const bullet = document.createElement("span");
        bullet.className = "bullet";
        bullet.textContent = "•";
        const label = document.createElement("span");
        label.className = "label";
        label.textContent = opts.label;
        el.appendChild(bullet);
        el.appendChild(label);
        if (opts.note) {
          const note = document.createElement("span");
          note.className = "note";
          note.textContent = opts.note;
          el.appendChild(note);
        }
        el.onclick = opts.onclick;
        return el;
      }

      async function render() {
        const s = await invoke("menu_state");
        const status = document.getElementById("status");
        status.textContent = s.status;
        status.className = "status" + (s.has_engine ? "" : " warn");

        const models = document.getElementById("models");
        models.innerHTML = "";
        for (const m of s.models) {
          models.appendChild(row({
            label: m.label, active: m.active, note: m.note,
            onclick: () => invoke("menu_choose_model", { name: m.id }),
          }));
        }
        if (s.custom_model) {
          models.appendChild(row({ label: s.custom_model, active: true, note: "", onclick: () => {} }));
        }

        const hotkeys = document.getElementById("hotkeys");
        hotkeys.innerHTML = "";
        for (const h of s.hotkeys) {
          hotkeys.appendChild(row({
            label: h.label, active: h.active, note: "",
            onclick: () => invoke("menu_choose_hotkey", { accel: h.id }).catch(() => {}),
          }));
        }
        if (s.custom_hotkey) {
          hotkeys.appendChild(row({ label: s.custom_hotkey, active: true, note: "", onclick: () => {} }));
        }

        const recent = document.getElementById("recent");
        recent.innerHTML = "";
        if (!s.recent.length) {
          const e = document.createElement("div");
          e.className = "empty";
          e.textContent = "no dictations yet";
          recent.appendChild(e);
        } else {
          s.recent.forEach((text, i) => {
            const short = text.length > 40 ? text.slice(0, 40) + "…" : text;
            recent.appendChild(row({
              label: short, active: false, note: "type",
              onclick: () => invoke("menu_type_recent", { index: i }),
            }));
          });
        }
      }

      document.getElementById("model-file").onclick = () => invoke("menu_model_from_file");
      document.getElementById("model-custom").onclick = () => invoke("menu_custom_model");
      document.getElementById("hotkey-record").onclick = () => invoke("menu_record_hotkey");
      document.getElementById("theme").onclick = () => invoke("menu_toggle_theme");
      document.getElementById("setup").onclick = () => invoke("menu_open_setup");
      document.getElementById("reload").onclick = () => invoke("menu_reload_config");
      document.getElementById("quit").onclick = () => invoke("menu_quit");

      listen("menu-updated", render);
      render();
    </script>
  </body>
</html>
