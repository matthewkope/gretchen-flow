<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gretchen Flow</title>
    <style>
      @font-face {
        font-family: "PixelOperator";
        src: url("fonts/PixelOperator.ttf") format("truetype");
        font-weight: normal;
      }
      @font-face {
        font-family: "PixelOperator";
        src: url("fonts/PixelOperator-Bold.ttf") format("truetype");
        font-weight: bold;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; width: 100%;
        background: #000;
        overflow: hidden;
      }
      /* plain black strip at the very top holding the native traffic
         lights; also the window drag region */
      .titlebar {
        position: fixed; top: 0; left: 0; right: 0; height: 40px;
        background: #000;
      }
      .frame {
        /* bordered window begins below the traffic-light strip */
        position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
        background: #000;
        color: #fff;
        font-family: "PixelOperator", monospace;
        font-size: 15px;
        line-height: 1.5;
        -webkit-font-smoothing: none;
        image-rendering: pixelated;
        user-select: none; -webkit-user-select: none;
        display: flex; flex-direction: column;
        overflow: hidden;
        /* SNES-style window chrome: thick white border with a thin
           inner keyline, hugging the window */
        border: 4px solid #fff;
        border-radius: 8px;
        box-shadow: inset 0 0 0 2px #000, inset 0 0 0 3px #fff;
      }
      /* framed mascot portrait — white box hugs the mascot, lives in the
         scroll so it scrolls away */
      .portrait-wrap {
        display: flex; flex-direction: column; align-items: center;
        margin: 0 0 14px;
      }
      .portrait {
        display: block;
        border: 3px solid #fff; border-radius: 10px;
        padding: 4px; line-height: 0;       /* box hugs the image */
        background: #000;
      }
      .mascot {
        display: block;
        width: 120px; height: 120px; object-fit: contain;
        image-rendering: pixelated;
      }
      .portrait-wrap .name { font-weight: bold; letter-spacing: 2px; margin-top: 8px; }
      .scroll { flex: 1; overflow-y: auto; padding: 16px 16px 12px; }
      .scroll::-webkit-scrollbar { width: 8px; }
      .scroll::-webkit-scrollbar-thumb { background: #fff; border-radius: 4px; }
      .status { font-size: 13px; color: #9bff9b; margin: 2px 0 14px; word-break: break-word; }
      .status.warn { color: #ffd23f; }
      h2 { font-size: 13px; font-weight: bold; margin: 16px 0 6px; color: #8be9ff; }
      .item {
        display: flex; align-items: baseline; gap: 6px;
        padding: 5px 6px; margin: 2px 0; cursor: pointer; border-radius: 4px;
      }
      .item:hover { background: #fff; color: #000; }
      .item:hover .note { color: #000; }
      .item .bullet { flex: 0 0 auto; }
      .item .label { flex: 1; word-break: break-word; }
      .item .note { font-size: 12px; color: #ff9b6b; }
      .item.active .bullet { color: #5fff5f; }
      .item.active:hover .bullet { color: #000; }
      .item.disabled { opacity: 0.4; cursor: default; }
      .item.disabled:hover { background: none; color: inherit; }
      .empty { color: #888; padding: 4px 6px; }
      /* plain black NES footer with white-bordered buttons */
      .footer {
        padding: 12px;
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        border-top: 3px solid #fff;
        background: #000;
      }
      .btn {
        cursor: pointer;
        padding: 9px 4px;
        text-align: center;
        font-size: 13px; font-weight: bold; letter-spacing: 1px;
        text-transform: uppercase;
        color: #fff;
        border: 2px solid #fff;
        border-radius: 4px;
        background: #000;
      }
      .btn:hover { background: #fff; color: #000; }
      .btn:active { background: #ddd; }
      .btn.danger { color: #ff8a8a; border-color: #ff8a8a; }
      .btn.danger:hover { background: #ff3b30; border-color: #ff3b30; color: #fff; }
    </style>
  </head>
  <body>
    <div class="titlebar" data-tauri-drag-region></div>
    <div class="frame">
      <div class="scroll">
        <div class="portrait-wrap">
          <div class="portrait"><img class="mascot" src="gretchen.png" alt="Gretchen" /></div>
          <span class="name">GRETCHEN FLOW</span>
        </div>
        <div id="status" class="status">…</div>

        <h2>MODEL</h2>
        <div id="models"></div>
        <div class="item" id="model-file"><span class="bullet">•</span><span class="label">from file…</span></div>
        <div class="item" id="model-custom"><span class="bullet">↗</span><span class="label">browse models on Hugging Face…</span></div>

        <h2>SHORTCUTS</h2>
        <div id="hotkeys"></div>
        <div class="item" id="hotkey-record"><span class="bullet">+</span><span class="label">add shortcut…</span></div>

        <h2>RECENT</h2>
        <div id="recent"></div>
        <div class="item" id="recent-clear" style="display:none"><span class="bullet">✕</span><span class="label">clear history</span></div>
      </div>
      <div class="footer">
        <span class="btn" id="setup">setup</span>
        <span class="btn" id="reload">reload cfg</span>
        <span class="btn danger" id="quit">quit</span>
      </div>
    </div>

    <script src="menu.js"></script>
  </body>
</html>
