<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gretchen Flow</title>
    <style>
      @font-face {
        font-family: "PressStart2P";
        src: url("fonts/PressStart2P-Regular.ttf") format("truetype");
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; width: 100%;
        background: transparent;       /* transparent window — rounded corners show */
        overflow: hidden;
      }
      /* NES dialog-box frame: rounded black panel with a white bevel */
      .frame {
        position: fixed; inset: 0;
        background: #0b0b0b;
        border-radius: 18px;
        border: 4px solid #f4f4f4;     /* bright white frame */
        box-shadow:
          0 0 0 2px #000,              /* crisp outer edge */
          inset 0 0 0 2px #8c8c8c,     /* gray inner bevel */
          inset 0 0 0 4px #0b0b0b;     /* back to black */
        color: #fff;
        font-family: "PressStart2P", monospace;
        font-size: 9px;
        line-height: 1.7;
        -webkit-font-smoothing: none;
        user-select: none; -webkit-user-select: none;
        display: flex; flex-direction: column;
        overflow: hidden;
      }
      .titlebar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 14px; cursor: grab;
      }
      .titlebar:active { cursor: grabbing; }
      .titlebar .name { letter-spacing: 1px; }
      .x { cursor: pointer; padding: 2px 6px; border: 2px solid #fff; }
      .x:hover { background: #fff; color: #000; }
      .scroll { flex: 1; overflow-y: auto; padding: 4px 14px 10px; }
      .scroll::-webkit-scrollbar { width: 8px; }
      .scroll::-webkit-scrollbar-thumb { background: #fff; }
      .status { font-size: 8px; color: #9bff9b; margin: 4px 0 14px; word-break: break-word; }
      .status.warn { color: #ffd23f; }
      h2 { font-size: 9px; margin: 16px 0 8px; color: #7fdfff; letter-spacing: 1px; }
      .item {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 8px; margin: 3px 0; cursor: pointer;
        border: 2px solid transparent;
      }
      .item:hover { border-color: #fff; }
      .item .mark { width: 10px; flex: 0 0 10px; color: #5fff5f; }
      .item .label { flex: 1; word-break: break-word; }
      .item .note { font-size: 7px; color: #ff8c69; }
      .item.active { background: #1a1a1a; }
      .empty { font-size: 8px; color: #777; padding: 6px 8px; }
      .footer {
        padding: 12px 14px; display: flex; gap: 10px; flex-wrap: wrap;
        border-top: 2px solid #555;
      }
      .btn { cursor: pointer; padding: 6px 8px; border: 2px solid #fff; font-size: 8px; }
      .btn:hover { background: #fff; color: #000; }
      .btn.danger:hover { background: #ff3b30; border-color: #ff3b30; color: #fff; }
    </style>
  </head>
  <body>
    <div class="frame">
      <!-- whole bar is the drag handle -->
      <div class="titlebar" data-tauri-drag-region>
        <span class="name" data-tauri-drag-region>¿ GRETCHEN FLOW</span>
        <span class="x" id="close">X</span>
      </div>
      <!-- empty areas of the scroll region also drag the window -->
      <div class="scroll" data-tauri-drag-region>
        <div id="status" class="status">…</div>

        <h2 data-tauri-drag-region>MODEL</h2>
        <div id="models"></div>
        <div class="item" id="model-file"><span class="mark"></span><span class="label">FROM FILE…</span></div>
        <div class="item" id="model-custom"><span class="mark"></span><span class="label">CUSTOM NAME…</span></div>

        <h2 data-tauri-drag-region>HOTKEY</h2>
        <div id="hotkeys"></div>
        <div class="item" id="hotkey-record"><span class="mark"></span><span class="label">SET CUSTOM…</span></div>

        <h2 data-tauri-drag-region>RECENT</h2>
        <div id="recent"></div>
      </div>
      <div class="footer" data-tauri-drag-region>
        <span class="btn" id="theme">FLIP ICON</span>
        <span class="btn" id="setup">SETUP</span>
        <span class="btn" id="reload">RELOAD CFG</span>
        <span class="btn danger" id="quit">QUIT</span>
      </div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      function row(opts) {
        const el = document.createElement("div");
        el.className = "item" + (opts.active ? " active" : "");
        const mark = document.createElement("span");
        mark.className = "mark";
        mark.textContent = opts.active ? "►" : "";
        const label = document.createElement("span");
        label.className = "label";
        label.textContent = opts.label;
        el.appendChild(mark);
        el.appendChild(label);
        if (opts.note) {
          const note = document.createElement("span");
          note.className = "note";
          note.textContent = opts.note;
          el.appendChild(note);
        }
        el.onclick = opts.onclick;
        return el;
      }

      async function render() {
        const s = await invoke("menu_state");
        const status = document.getElementById("status");
        status.textContent = s.status;
        status.className = "status" + (s.has_engine ? "" : " warn");

        const models = document.getElementById("models");
        models.innerHTML = "";
        for (const m of s.models) {
          models.appendChild(row({
            label: m.label, active: m.active, note: m.note,
            onclick: () => invoke("menu_choose_model", { name: m.id }),
          }));
        }
        if (s.custom_model) {
          models.appendChild(row({ label: s.custom_model, active: true, note: "", onclick: () => {} }));
        }

        const hotkeys = document.getElementById("hotkeys");
        hotkeys.innerHTML = "";
        for (const h of s.hotkeys) {
          hotkeys.appendChild(row({
            label: h.label, active: h.active, note: "",
            onclick: () => invoke("menu_choose_hotkey", { accel: h.id }).catch(() => {}),
          }));
        }
        if (s.custom_hotkey) {
          hotkeys.appendChild(row({ label: s.custom_hotkey, active: true, note: "", onclick: () => {} }));
        }

        const recent = document.getElementById("recent");
        recent.innerHTML = "";
        if (!s.recent.length) {
          const e = document.createElement("div");
          e.className = "empty";
          e.textContent = "NO DICTATIONS YET";
          recent.appendChild(e);
        } else {
          s.recent.forEach((text, i) => {
            const short = text.length > 38 ? text.slice(0, 38) + "…" : text;
            recent.appendChild(row({
              label: short, active: false, note: "type",
              onclick: () => invoke("menu_type_recent", { index: i }),
            }));
          });
        }
      }

      document.getElementById("model-file").onclick = () => invoke("menu_model_from_file");
      document.getElementById("model-custom").onclick = () => invoke("menu_custom_model");
      document.getElementById("hotkey-record").onclick = () => invoke("menu_record_hotkey");
      document.getElementById("theme").onclick = () => invoke("menu_toggle_theme");
      document.getElementById("setup").onclick = () => invoke("menu_open_setup");
      document.getElementById("reload").onclick = () => invoke("menu_reload_config");
      document.getElementById("quit").onclick = () => invoke("menu_quit");
      document.getElementById("close").onclick = () => invoke("menu_close");

      listen("menu-updated", render);
      render();
    </script>
  </body>
</html>
