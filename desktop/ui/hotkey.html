<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Set Hotkey</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; height: 100vh; margin: 0; gap: 14px;
        user-select: none; -webkit-user-select: none;
      }
      p { margin: 0; opacity: 0.7; font-size: 13px; }
      #combo {
        font-size: 24px; font-weight: 600; min-height: 34px;
        padding: 10px 24px; border-radius: 10px;
        background: rgba(127, 127, 127, 0.15);
      }
      #error { color: #ff453a; font-size: 12px; min-height: 16px; margin: 0; }
      .row { display: flex; gap: 10px; }
      button {
        font-size: 13px; padding: 6px 18px; border-radius: 7px;
        border: 1px solid rgba(127, 127, 127, 0.4); background: transparent;
        color: inherit; cursor: pointer;
      }
      button.primary { background: #0a84ff; border-color: #0a84ff; color: white; }
      button:disabled { opacity: 0.4; cursor: default; }
    </style>
  </head>
  <body>
    <p id="prompt">Press the key combination you want to add</p>
    <div id="combo">…</div>
    <p id="error"></p>
    <div class="row">
      <button id="cancel">Cancel</button>
      <button id="remove" style="display:none">Remove</button>
      <button id="fn">Use Fn 🌐</button>
      <button id="save" class="primary" disabled>Add Shortcut</button>
    </div>
    <script src="hotkey.js"></script>
  </body>
</html>
