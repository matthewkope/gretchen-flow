name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# This builds the macOS app bundle + .dmg and attaches it to a GitHub Release,
# which is what the Homebrew cask downloads.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # Apple Silicon
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: desktop/src-tauri
      - name: Install build tools
        run: |
          brew install cmake
          cargo install tauri-cli --version "^2" --locked
      - name: Build app + DMG
        run: cargo tauri build
      - name: Publish release with DMG
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
