name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# This builds the macOS app bundle + .dmg and attaches it to a GitHub Release,
# which is what the Homebrew cask downloads.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # Apple Silicon
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: desktop/src-tauri
      - name: Install build tools
        run: |
          brew install cmake
          cargo install tauri-cli --version "^2" --locked
      # Import the stable self-signed code-signing certificate into a temporary
      # keychain. Signing every release with the SAME cert keeps the app's code
      # identity constant, so users' macOS permissions (Microphone,
      # Accessibility, Input Monitoring) survive `brew upgrade` instead of
      # resetting on each update. The cert is self-signed (not notarized), so
      # Gatekeeper still shows the unverified-developer prompt on first install
      # (handled by the cask's xattr caveat).
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/gf-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Prepend our keychain to the search list so codesign finds the cert.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"
      - name: Build app + DMG (signed)
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          cargo tauri build --config \
            "{\"bundle\":{\"macOS\":{\"signingIdentity\":\"$SIGNING_IDENTITY\"}}}"
      - name: Publish release with DMG
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
